# Railway Deployment Configuration
[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x", "python3", "gcc", "glibc"]  # Added build tools for native deps

[build.nixpacksPlan.phases.install]
cmds = ["npm ci --include=dev"]  # Include dev deps for build

[build.nixpacksPlan.phases.build]
cmds = ["npx prisma generate", "npm run build"]

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
NEXT_PUBLIC_DISABLE_SUBDOMAINS = "true"

[[services]]
name = "web"

[services.web]
source = "."
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[services.web.variables]
NODE_ENV = "production"
NEXT_PUBLIC_DISABLE_SUBDOMAINS = "true"

[[services]]
name = "database"

[services.database]
image = "postgres:15-alpine"
port = 5432

[services.database.variables]
POSTGRES_DB = "schooerp"
POSTGRES_USER = "schooerp"
POSTGRES_PASSWORD = "secure-password"
