<!DOCTYPE html>
<html>
<head>
    <title>Close Button Test</title>
    <style>
        .test-form {
            position: relative;
            padding: 24px;
            border: 2px solid #8b5cf6;
            border-radius: 8px;
            background: #1f2937;
            color: white;
            margin: 20px;
        }
        .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: transparent;
            color: #9ca3af;
            transition: all 0.2s;
            cursor: pointer;
        }
        .close-btn:hover {
            color: #e5e7eb;
            background: #374151;
        }
    </style>
</head>
<body style="background: #111827; padding: 20px;">
    <h2 style="color: white;">Close Button Test - This is what you should see:</h2>
    
    <div class="test-form">
        <button class="close-btn" title="Close">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <h3>Create New Role</h3>
        <p>This demonstrates the close button in the top-right corner.</p>
        <p style="margin-top: 200px;">
            <button style="padding: 8px 16px; border: 1px solid #4b5563; background: transparent; color: #9ca3af; border-radius: 4px;">Cancel</button>
            <button style="padding: 8px 16px; background: #8b5cf6; color: white; border: none; border-radius: 4px; margin-left: 8px;">✓ Create Role</button>
        </p>
    </div>

    <div class="test-form">
        <button class="close-btn" title="Close">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <h3>Add New User</h3>
        <p>This demonstrates the close button in the top-right corner.</p>
        <p style="margin-top: 200px;">
            <button style="padding: 8px 16px; border: 1px solid #4b5563; background: transparent; color: #9ca3af; border-radius: 4px;">Cancel</button>
            <button style="padding: 8px 16px; background: #8b5cf6; color: white; border: none; border-radius: 4px; margin-left: 8px;">✓ Create User</button>
        </p>
    </div>
</body>
</html>
